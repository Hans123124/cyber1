<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberClub — User Management</title>
<link rel="stylesheet" href="admin.css">
<script type="module" src="nav.js"></script>
<script type="module" src="status-widget.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════════════════
     SIDEBAR
     ══════════════════════════════════════════════════════════════════════════ -->
<nav class="sidebar">
  <div class="logo">⚡ CyberClub</div>
  <a href="index.html"         class="nav-item nav-map"          >🗺 Map</a>
  <a href="configuration.html" class="nav-item nav-config"       >⚙️ Configuration</a>
  <a href="workstations.html"  class="nav-item nav-ws"           >🖥 Workstations</a>
  <div style="flex:1"></div>
  <a href="users.html"         class="nav-item nav-users active" >👤 Users</a>
  <a href="#"                  class="nav-item nav-logout"
     style="color:var(--danger);">⏏ Logout</a>
</nav>

<!-- ══════════════════════════════════════════════════════════════════════════
     USERS PAGE
     ══════════════════════════════════════════════════════════════════════════ -->
<div style="flex:1;overflow-y:auto;">
  <div class="page-wrap">
    <h1>User Management</h1>

    <!-- Add User Form -->
    <div class="card">
      <h2>Add User</h2>
      <div class="form-grid">
        <div class="form-field">
          <label>Email *</label>
          <input type="email" id="new-email" placeholder="user@example.com">
        </div>
        <div class="form-field">
          <label>Username</label>
          <input type="text" id="new-username" placeholder="username">
        </div>
        <div class="form-field">
          <label>Display Name</label>
          <input type="text" id="new-displayname" placeholder="Full Name">
        </div>
        <div class="form-field">
          <label>Password *</label>
          <input type="password" id="new-password" placeholder="••••••••">
        </div>
        <div class="form-field">
          <label>Role</label>
          <select id="new-role">
            <option value="">Player (Customer)</option>
            <option value="Cashier">Cashier (Staff)</option>
            <option value="Admin">Admin</option>
            <option value="SuperAdmin">SuperAdmin</option>
          </select>
        </div>
        <div class="form-field">
          <label>Assign Clubs</label>
          <select id="new-clubs" multiple style="min-height:80px;"><!-- populated dynamically --></select>
        </div>
      </div>
      <div class="form-error" id="add-error"></div>
      <div style="margin-top:14px;">
        <button class="btn btn-primary" id="btn-add-user">Add User</button>
      </div>
    </div>

    <!-- Users Table -->
    <div class="card">
      <h2>All Users</h2>
      <table class="data-table" id="users-table">
        <thead>
          <tr>
            <th>Email</th>
            <th>Username</th>
            <th>Display Name</th>
            <th>Roles</th>
            <th>Clubs</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px;">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
import { apiFetch, escHtml } from './api.js';

// Guard: redirect non-SuperAdmins (server also enforces this with 403)
try {
  const meRes = await fetch('/api/account/me');
  if (!meRes.ok) { location.href = '/'; }
  else {
    const me = await meRes.json();
    if (!Array.isArray(me.roles) || !me.roles.includes('SuperAdmin')) {
      location.href = '/';
    }
  }
} catch {
  location.href = '/login';
}

let allClubs = [];

async function loadClubs() {
  const res = await apiFetch('/api/admin/clubs');
  if (!res.ok) return;
  allClubs = await res.json();
  const sel = document.getElementById('new-clubs');
  sel.innerHTML = allClubs.map(c => `<option value="${escHtml(String(c.id))}">${escHtml(c.name)}</option>`).join('');
}

async function loadUsers() {
  const tbody = document.getElementById('users-body');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px;">Loading…</td></tr>';
  const res = await apiFetch('/api/admin/users');
  if (!res.ok) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--danger);padding:20px;">Failed to load users.</td></tr>';
    return;
  }
  const users = await res.json();
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px;">No users found.</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => {
    const roleBadges = (u.roles || [])
      .map(r => `<span class="badge badge-${escHtml(r.toLowerCase())}">${escHtml(r)}</span>`)
      .join('') || '<span class="badge badge-player">Player</span>';
    const clubs = u.clubs?.length ? u.clubs.map(c => escHtml(c.name)).join(', ') : '—';
    return `<tr>
      <td>${escHtml(u.email || '')}</td>
      <td>${escHtml(u.username || '')}</td>
      <td>${escHtml(u.displayName || '')}</td>
      <td>${roleBadges}</td>
      <td class="clubs-list">${clubs}</td>
      <td><button class="btn btn-danger btn-sm" data-uid="${escHtml(u.id)}">Delete</button></td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('[data-uid]').forEach(btn => {
    btn.addEventListener('click', () => deleteUser(btn.dataset.uid));
  });
}

async function addUser() {
  const errEl = document.getElementById('add-error');
  errEl.classList.remove('visible');
  const email       = document.getElementById('new-email').value.trim();
  const password    = document.getElementById('new-password').value;
  const username    = document.getElementById('new-username').value.trim()    || null;
  const displayName = document.getElementById('new-displayname').value.trim() || null;
  const role        = document.getElementById('new-role').value               || null;
  const clubsSel    = document.getElementById('new-clubs');
  const clubIds     = Array.from(clubsSel.selectedOptions).map(o => o.value);

  if (!email || !password) {
    errEl.textContent = 'Email and password are required.';
    errEl.classList.add('visible');
    return;
  }

  const res = await apiFetch('/api/admin/users', {
    method: 'POST',
    body: JSON.stringify({ email, password, username, displayName, role, clubIds }),
  });

  if (res.ok) {
    document.getElementById('new-email').value       = '';
    document.getElementById('new-password').value    = '';
    document.getElementById('new-username').value    = '';
    document.getElementById('new-displayname').value = '';
    document.getElementById('new-role').value        = '';
    clubsSel.selectedIndex = -1;
    await loadUsers();
  } else {
    const data = await res.json().catch(() => ({}));
    const errs = data.errors ? data.errors.join('; ') : (data.error || 'Failed to create user.');
    errEl.textContent = errs;
    errEl.classList.add('visible');
  }
}

async function deleteUser(id) {
  if (!confirm('Delete this user?')) return;
  const res = await apiFetch(`/api/admin/users/${encodeURIComponent(id)}`, { method: 'DELETE' });
  if (res.ok) await loadUsers();
  else alert('Failed to delete user.');
}

document.getElementById('btn-add-user').addEventListener('click', addUser);

loadClubs();
loadUsers();
</script>
</body>
</html>
