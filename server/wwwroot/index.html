  // Redirect to login if not authenticated

<!-- DEBUG PANEL (auto-updating) -->
<div id="debug-panel" style="position:fixed;top:8px;right:8px;z-index:3000;background:rgba(18,20,31,.92);border:1px solid rgba(46,50,84,.9);backdrop-filter:blur(10px);color:#e0e2f5;border-radius:10px;padding:10px 10px 8px;min-width:280px;max-width:360px;font:12px 'Segoe UI',system-ui,sans-serif;">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;">
    <div style="font-weight:700;letter-spacing:.02em;">Debug</div>
    <div style="display:flex;gap:6px;">
      <button id="dbg-refresh" style="background:#20233a;border:1px solid #2e3254;color:#e0e2f5;border-radius:6px;padding:4px 8px;cursor:pointer;">Refresh</button>
      <button id="dbg-logout" style="background:#2a1a1a;border:1px solid #8a2a2a;color:#f59595;border-radius:6px;padding:4px 8px;cursor:pointer;">Logout</button>
    </div>
  </div>
  <div id="dbg-auth" style="color:#8890b8;line-height:1.35;">Loading…</div>
  <div style="height:1px;background:#2e3254;margin:8px 0;"></div>
  <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
    <div style="color:#8890b8;min-width:44px;">Club</div>
    <select id="dbg-club" style="flex:1;background:#272a42;border:1px solid #2e3254;color:#e0e2f5;border-radius:6px;padding:4px 6px;cursor:pointer;"></select>
  </div>
  <div id="dbg-tariffs" style="color:#8890b8;white-space:pre-wrap;max-height:180px;overflow:auto;"></div>
  <div id="dbg-last" style="margin-top:6px;color:#8890b8;font-size:11px;">
    —
  </div>
</div>

<div id="main">
  <div id="topbar">
    <h1>CyberClub Admin</h1>
    <button class="tab-btn active" data-tab="map">Map</button>
    <button class="tab-btn" data-tab="management">Management</button>
    <button class="tab-btn" data-tab="configuration">Configuration</button>
    <select id="club-selector"><option value="">Loading clubs…</option></select>
  </div>

  <div id="content" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
    <!-- Existing HTML remains unchanged from current file after this point -->
  </div>
</div>

<script>
  // Debug panel logic (non-blocking)
  (function(){
    const dbgAuth = document.getElementById('dbg-auth');
    const dbgClub = document.getElementById('dbg-club');
    const dbgTariffs = document.getElementById('dbg-tariffs');
    const dbgLast = document.getElementById('dbg-last');
    const btnRefresh = document.getElementById('dbg-refresh');
    const btnLogout = document.getElementById('dbg-logout');

    let clubs = [];

    function fmtTime(d){
      return d.toLocaleString();
    }

    async function safeJson(r){
      try { return await r.json(); } catch { return null; }
    }

    async function loadMe(){
      const r = await fetch('/api/account/me', { headers: { 'Content-Type':'application/json' } });
      if (r.status === 401) {
        dbgAuth.textContent = 'Not authenticated (401) — redirecting to /login…';
        setTimeout(()=>location.href='/login', 300);
        return null;
      }
      const me = await safeJson(r);
      if (!me) {
        dbgAuth.textContent = 'Authenticated, but /api/account/me returned no JSON.';
        return null;
      }
      const roles = (me.roles || []).join(', ') || '—';
      dbgAuth.innerHTML = `User: <b>${me.email || me.userName || '—'}</b><br>Roles: <b>${roles}</b>`;
      return me;
    }

    async function loadClubs(){
      // Use same API root the app uses
      const r = await fetch('/api/admin/clubs', { headers: { 'Content-Type':'application/json' } });
      if (!r.ok) {
        dbgTariffs.textContent = `Clubs load failed: ${r.status} ${await r.text()}`;
        return [];
      }
      const data = await safeJson(r);
      return Array.isArray(data) ? data : [];
    }

    function renderClubSelect(){
      if (!dbgClub) return;
      dbgClub.innerHTML = clubs.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
      const cur = localStorage.getItem('dbgClubId');
      if (cur && clubs.some(c=>c.id===cur)) dbgClub.value = cur;
      else if (clubs[0]) dbgClub.value = clubs[0].id;
    }

    async function loadTariffs(clubId){
      if (!clubId) {
        dbgTariffs.textContent = 'Select a club to load tariff plans.';
        return;
      }
      const r = await fetch(`/api/admin/clubs/${clubId}/tariff-plans`, { headers: { 'Content-Type':'application/json' } });
      if (!r.ok) {
        dbgTariffs.textContent = `Tariffs load failed: ${r.status} ${await r.text()}`;
        return;
      }
      const data = await safeJson(r);
      if (!Array.isArray(data) || data.length === 0) {
        dbgTariffs.textContent = '(no tariff plans)';
        return;
      }
      dbgTariffs.textContent = data.map(t => {
        const rate = (t.hourlyRateMdl ?? t.hourlyRate ?? t.price ?? '—');
        const active = (t.isActive === false) ? 'inactive' : 'active';
        return `• ${t.name} — ${rate} MDL/h (${active})`;
      }).join('\n');
    }

    async function refreshAll(){
      try {
        await loadMe();
        clubs = await loadClubs();
        renderClubSelect();
        const clubId = dbgClub.value;
        localStorage.setItem('dbgClubId', clubId);
        await loadTariffs(clubId);
        dbgLast.textContent = `Updated: ${fmtTime(new Date())}`;
      } catch (e) {
        dbgTariffs.textContent = `Debug refresh error: ${e.message || e}`;
      }
    }

    btnRefresh.addEventListener('click', refreshAll);
    dbgClub.addEventListener('change', ()=>refreshAll());
    btnLogout.addEventListener('click', async ()=>{
      try {
        await fetch('/api/account/logout', { method:'POST', headers:{'Content-Type':'application/json'} });
      } catch {}
      location.href = '/login';
    });

    // auto refresh every 10 seconds
    refreshAll();
    setInterval(refreshAll, 10000);
  })();
</script>
</body>
</html>.
