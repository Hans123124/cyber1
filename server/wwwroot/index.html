<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberClub Admin</title>
<link rel="stylesheet" href="admin.css">
<script type="module" src="nav.js"></script>
<script type="module" src="status-widget.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════════════════
     SIDEBAR
     ══════════════════════════════════════════════════════════════════════════ -->
<nav class="sidebar">
  <div class="logo">⚡ CyberClub</div>
  <a href="index.html"         class="nav-item nav-map    active">🗺 Map</a>
  <a href="configuration.html" class="nav-item nav-config"       >⚙️ Configuration</a>
  <a href="workstations.html"  class="nav-item nav-ws"           >🖥 Workstations</a>
  <div style="flex:1"></div>
  <a href="users.html"         class="nav-item nav-users"        >👤 Users</a>
  <a href="#"                  class="nav-item nav-logout"
     style="color:var(--danger);">⏏ Logout</a>
</nav>

<!-- ══════════════════════════════════════════════════════════════════════════
     MAP PAGE
     ══════════════════════════════════════════════════════════════════════════ -->
<div id="map-page">
  <div id="map-main">
    <!-- Top bar -->
    <div id="map-topbar" class="topbar">
      <span class="page-title">Map</span>
      <span class="sep"></span>
      <label class="inline-label">Admin Key:
        <input type="password" id="admin-key-input" placeholder="X-Admin-Key" size="14">
      </label>
      <span class="sep"></span>
      <button class="btn btn-sm" id="btn-save">💾 Save</button>
      <button class="btn btn-sm btn-secondary" id="btn-zoom-out">−</button>
      <button class="btn btn-sm btn-secondary" id="btn-zoom-reset">1×</button>
      <button class="btn btn-sm btn-secondary" id="btn-zoom-in">+</button>
    </div>

    <!-- Canvas + right panel -->
    <div style="flex:1;overflow:hidden;display:flex;">
      <!-- Canvas -->
      <div id="canvas-wrapper" class="canvas-wrapper">
        <canvas id="map-canvas"></canvas>
      </div>

      <!-- Right panel -->
      <div class="right-panel">
        <!-- Tabs -->
        <div class="panel-tabs">
          <button class="tab-btn active" data-tab="settings">Settings</button>
          <button class="tab-btn" data-tab="elements">Elements</button>
          <button class="tab-btn" data-tab="zones">Zones</button>
        </div>

        <!-- Settings tab -->
        <div class="tab-content active" id="tab-settings">
          <div class="panel-section">
            <h3>Grid &amp; Size</h3>
            <label>Grid size (px)
              <input type="number" id="cfg-grid-size" min="10" max="120" value="40">
            </label>
            <label>Width (px)
              <input type="number" id="cfg-width" min="400" max="6000" value="1200">
            </label>
            <label>Height (px)
              <input type="number" id="cfg-height" min="300" max="4000" value="800">
            </label>
            <div class="btn-row">
              <button class="btn btn-sm" id="btn-apply-map">Apply</button>
            </div>
          </div>
        </div>

        <!-- Elements tab -->
        <div class="tab-content" id="tab-elements">
          <div class="panel-section">
            <h3>Palette</h3>
            <div class="element-grid" id="element-palette"></div>
          </div>
          <div class="panel-section" id="selected-panel" style="display:none;">
            <h3>Selected Item</h3>
            <label>Label
              <input type="text" id="sel-label" placeholder="PC-01">
            </label>
            <label>Rotation (°)
              <input type="number" id="sel-rotation" min="0" max="359" step="90" value="0">
            </label>
            <label>Workstation
              <select id="sel-workstation">
                <option value="">— none —</option>
              </select>
            </label>
            <div class="btn-row">
              <button class="btn btn-sm" id="btn-sel-save">Save</button>
              <button class="btn btn-sm btn-danger" id="btn-sel-delete">Delete</button>
            </div>
          </div>
        </div>

        <!-- Zones tab -->
        <div class="tab-content" id="tab-zones">
          <div class="panel-section">
            <h3>New Zone</h3>
            <label>Name
              <input type="text" id="zone-name" placeholder="VIP Area">
            </label>
            <label>Color
              <input type="color" id="zone-color" value="#3b82f6">
            </label>
            <div class="btn-row">
              <button class="btn btn-sm" id="btn-add-zone">✏ Draw Zone</button>
            </div>
          </div>
          <div class="panel-section">
            <h3>Zones</h3>
            <ul class="zone-list" id="zone-list"></ul>
          </div>
        </div>
      </div>
    </div>

    <!-- Status bar -->
    <div class="statusbar" id="status-bar">Ready</div>
  </div>
</div>

<!-- ── Context menu ─────────────────────────────────────────────────────── -->
<div id="ctx-menu" class="context-menu" style="display:none;">
  <div class="ctx-item" data-action="lock">🔒 Lock</div>
  <div class="ctx-item" data-action="unlock">🔓 Unlock</div>
  <div class="ctx-item" data-action="reboot">🔄 Reboot</div>
  <div class="ctx-item" data-action="shutdown">⏻ Shutdown</div>
  <hr>
  <div class="ctx-item" data-action="delete" style="color:var(--danger);">🗑 Delete</div>
</div>

<!-- ── Map entry point ──────────────────────────────────────────────────── -->
<script type="module" src="map.js"></script>

</body>
</html>
