<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberClub — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1c2e;
    color: #e0e2f5;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .card {
    background: #20233a;
    border: 1px solid #2e3254;
    border-radius: 12px;
    padding: 36px 32px;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  h1 { font-size: 22px; font-weight: 700; text-align: center; }
  .subtitle { font-size: 13px; color: #8890b8; text-align: center; margin-top: -12px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; color: #8890b8; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
  input {
    background: #272a42;
    border: 1px solid #2e3254;
    color: #e0e2f5;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: #5b6af0; }
  .btn {
    background: #5b6af0;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .btn:hover { background: #3d4ac0; }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .error {
    background: rgba(231,76,60,.12);
    border: 1px solid rgba(231,76,60,.3);
    color: #e74c3c;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    display: none;
  }
  .error.visible { display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>🎮 CyberClub</h1>
  <p class="subtitle">Admin Panel</p>
  <div class="field">
    <label>Email or Username</label>
    <input type="text" id="email" placeholder="admin@example.com" autocomplete="username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <div class="error" id="err-msg"></div>
  <button class="btn" id="login-btn">Sign In</button>
</div>
<script>
  const emailEl = document.getElementById('email');
  const passEl = document.getElementById('password');
  const errEl = document.getElementById('err-msg');
  const btn = document.getElementById('login-btn');

  async function doLogin() {
    errEl.classList.remove('visible');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/account/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: emailEl.value.trim(), password: passEl.value, rememberMe: false })
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        const data = await res.json().catch(() => ({}));
        errEl.textContent = data.error || 'Login failed. Check your credentials.';
        errEl.classList.add('visible');
      }
    } catch (e) {
      errEl.textContent = 'Network error. Please try again.';
      errEl.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  btn.addEventListener('click', doLogin);
  [emailEl, passEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }));
</script>
</body>
</html>
