<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberClub — Login</title>
<link rel="stylesheet" href="admin.css">
</head>
<body class="login-page">
<div class="login-card">
  <h1>🎮 CyberClub</h1>
  <p class="login-subtitle">Admin Panel</p>
  <div class="login-field">
    <label>Email or Username</label>
    <input type="text" id="email" placeholder="admin@example.com" autocomplete="username">
  </div>
  <div class="login-field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <div class="form-error" id="err-msg"></div>
  <button class="login-btn" id="login-btn">Sign In</button>
</div>
<script>
  const emailEl = document.getElementById('email');
  const passEl  = document.getElementById('password');
  const errEl   = document.getElementById('err-msg');
  const btn     = document.getElementById('login-btn');

  async function doLogin() {
    errEl.classList.remove('visible');
    btn.disabled    = true;
    btn.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/account/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email: emailEl.value.trim(), password: passEl.value, rememberMe: false }),
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        const data = await res.json().catch(() => ({}));
        errEl.textContent = data.error || 'Login failed. Check your credentials.';
        errEl.classList.add('visible');
      }
    } catch {
      errEl.textContent = 'Network error. Please try again.';
      errEl.classList.add('visible');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  }

  btn.addEventListener('click', doLogin);
  [emailEl, passEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }));
</script>
</body>
</html>
