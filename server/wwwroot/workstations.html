<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CyberClub – Workstations</title>
<link rel="stylesheet" href="admin.css"/>
<script type="module" src="nav.js"></script>
<script type="module" src="status-widget.js"></script>
</head>
<body>

<nav class="sidebar">
  <div class="logo">⚡ CyberClub</div>
  <a href="index.html"         class="nav-item nav-map"       >🗺 Map</a>
  <a href="configuration.html" class="nav-item nav-config"    >⚙️ Configuration</a>
  <a href="workstations.html"  class="nav-item nav-ws  active">🖥 Workstations</a>
  <div style="flex:1"></div>
  <a href="users.html"         class="nav-item nav-users"     >👤 Users</a>
  <a href="#"                  class="nav-item nav-logout"
     style="color:var(--danger);">⏏ Logout</a>
</nav>

<main class="main-content" style="flex:1">
  <div class="topbar">
    <span class="page-title">Workstations</span>
    <div class="topbar-right">
      <label class="inline-label">Admin Key:
        <input type="password" id="admin-key-input" placeholder="X-Admin-Key" size="18"/>
      </label>
      <button class="btn btn-sm" id="btn-refresh">🔄 Refresh</button>
    </div>
  </div>

  <div class="ws-page">
    <table class="ws-table" id="ws-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>State</th>
          <th>Last seen</th>
          <th>IP</th>
          <th>Agent ver.</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="ws-tbody">
        <tr><td colspan="6" style="text-align:center;color:var(--muted)">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script type="module" src="workstations.js"></script>
</body>
</html>
